# --- Font Settings ---
font_family      JetBrains Mono
font_size        10.5

# --- Window & Border ---
hide_window_decorations no

# --- Mouse & Scrolling ---
open_url_with default
copy_on_select yes

# --- Performance & Appearance ---
term xterm-kitty
background_opacity 1.0

# OFFICIAL COSMIC DARK THEME (from .ron file)
background #1B1B1B
foreground #C4C4C4
cursor     #C4C4C4
selection_background #C4C4C4
selection_foreground #1B1B1B

# --- ANSI Colors (From .ron file) ---
# Normal
color0  #1B1B1B
color1  #F16161
color2  #7CB987
color3  #DDC74C
color4  #6296BE
color5  #BE6DEE
color6  #49BAC8
color7  #BEBEBE

# Bright
color8  #808080
color9  #FF8985
color10 #97D5A0
color11 #FAE365
color12 #7DB1DA
color13 #D68EFF
color14 #49BAC8
color15 #C4C4C4
