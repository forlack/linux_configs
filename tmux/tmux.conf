# --- General Settings ---
# Support 24-bit True Color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -ag terminal-features ",xterm-kitty:sync"
set -g allow-passthrough on

# Speed and Usability
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
setw -g allow-rename on
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# Increase Scrollback history
set -g history-limit 10000

# --- Prefix Change ---
# Change prefix to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# --- Keybindings ---
# Easy reload of config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Quick window switching (Tab)
bind Tab last-window

# Middle-click a tab to rename it
bind -n MouseDown2Status select-window \; command-prompt -I "#W" "rename-window -- '%%'"

# Floating scratchpad terminal (f)
# Note: Requires tmux 3.2+
bind f display-popup -E -w 80% -h 80%

# Split panes using \ and - (and stay in current directory)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Alt+j: cycle windows, Alt+k: cycle panes
bind -n M-j next-window
bind -n M-k select-pane -t :.+

# --- Appearance (COSMIC Dark) ---
# Status bar colors
set -g status-style bg='#1B1B1B',fg='#C4C4C4'
set -g status-left-length 50
# Left side: Dynamic Session Name
set -g status-left '#[bg=#6296BE,fg=#1B1B1B,bold] #S #[bg=default,fg=#6296BE] '
set -g status-right '#[fg=#C4C4C4] %a %b %d | %I:%M %p '

# Window tabs style (Centered)
set -g status-justify centre
setw -g window-status-current-style bg=#49BAC8,fg=#1B1B1B,bold
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style bg='#1B1B1B',fg='#8E8E8E'
setw -g window-status-format ' #I:#W '

# --- Pane Appearance ---
# Standard thin borders
set -g pane-border-lines single

# Visual Dimming (Active vs Inactive)
# Active pane: Official Cosmic Dark Background
# Inactive pane: Slightly darker/Near-black for contrast
set -g window-style 'fg=#8E8E8E,bg=#1B1B1B'
set -g window-active-style 'fg=#C4C4C4,bg=#101010'

# Pane borders (Cyan for all - matching Cosmic Cyan)
set -g pane-border-style fg='#49BAC8'
set -g pane-active-border-style fg='#49BAC8'

# --- Bell Notification (Claude CLI ready) ---
set -g visual-bell off
set -g bell-action any
setw -g window-status-bell-style bg=#A6DA95,fg=#1B1B1B,bold

# Active-window bell: flash status bar green for 1 second (inactive windows use bell-style instead)
set-hook -g alert-bell {if -F "#{window_active}" {run-shell -b "tmux set -g status-style bg=#A6DA95,fg=#1B1B1B; sleep 1; tmux set -g status-style bg=#1B1B1B,fg=#C4C4C4"}}

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Continuum settings
set -g @continuum-save-interval '15' # Save every 15 minutes
set -g @continuum-restore 'off'      # Do not restore automatically

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
